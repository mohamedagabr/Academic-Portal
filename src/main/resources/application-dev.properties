# ===============================
#        application-dev.properties
#       (Development)
# ===============================

server.port=8080
# =========================
#        SqlServer
# =========================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=academic_portal;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Pro@12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =========================
#        JPA / Hibernate
# =========================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# =========================
#        Liquibase
# =========================
#spring.liquibase.enabled=true
#spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
# spring.liquibase.contexts=dev

# =========================
#        Spring Data REST
# =========================
spring.data.rest.detection-strategy=annotated
springdoc.data-rest.enabled=false
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
springdoc.show-spring-data-rest=false

# =========================
#        Logging
# =========================
logging.level.root=INFO
logging.level.com.etc.kpi=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

#logging.level.org.springframework.security=DEBUG
#logging.level.org.springframework.web.cors=DEBUG

logging.file.name=logs/app-dev.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7


