<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>

        body{
            font-family: Montserrat, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:600px;
            margin:auto;
            background:white;
            border-radius:8px;
            overflow:hidden;
        }

        .header{
            background:#b30000;
            color:white;
            padding:20px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
        }

        .content{
            padding:30px;
            color:#333;
        }

        .info-box{
            background:#f7f7f7;
            padding:15px;
            border-left:5px solid #b30000;
            margin-top:20px;
        }

        .button{
            display:inline-block;
            padding:15px 20px;
            color:#ffffff;
            text-decoration:none;
            border-radius:5px;
            margin-top:20px;
            background-color:#ec0000;
            font-weight:bold;
            font-family:Montserrat, sans-serif;
        }

        .footer{
            background:#e0e0e0;
            padding:15px;
            text-align:center;
            color:#555;
            font-size:12px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        ETC KPI Management System
    </div>

    <div class="content">

        <h2>Welcome <span th:text="${fullName}"></span> 🎉</h2>

        <p>Your account has been successfully created.</p>

        <div class="info-box">

            <p><b>Username:</b> <span th:text="${username}"></span></p>

            <p><b>Password:</b> <span th:text="${password}"></span></p>

        </div>

        <a class="button" th:href="${dashboardUrl}">
            Open Dashboard
        </a>

    </div>

    <div class="footer">
        Elsewedy Telecom Cables - KPI System
    </div>

</div>

</body>
</html>
